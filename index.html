<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>High-End Gesture Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #info {
            position: absolute; top: 30px; left: 30px; color: #fff; pointer-events: none;
            letter-spacing: 1px; z-index: 10;
        }
        #webcam-preview {
            position: absolute; bottom: 20px; right: 20px; width: 180px; height: 120px;
            border-radius: 12px; border: 1px solid rgba(255,255,255,0.2);
            transform: scaleX(-1); object-fit: cover;
        }
    </style>
</head>
<body>

    <div id="info">
        <h1 style="margin:0; font-weight: 300;">AETHER FLOW</h1>
        <p style="opacity: 0.6;">Pinch to Expand • Open Palm to Change Form</p>
    </div>
    <video id="webcam" style="display:none;" autoplay playsinline></video>
    <video id="webcam-preview" autoplay playsinline></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        // --- Setup ---
        const PARTICLE_COUNT = 8000;
        let handLandmarker, composer, particleSystem;
        let currentForm = 'sphere';
        const forms = ['sphere', 'heart', 'saturn', 'galaxy'];
        let lastChange = 0;

        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);

        camera.position.z = 6;

        // --- Post Processing (The "Glow" Secret) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.1;
        bloomPass.strength = 1.2; 
        bloomPass.radius = 0.5;

        composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- Particle Engine ---
        const geometry = new THREE.BufferGeometry();
        const pos = new Float32Array(PARTICLE_COUNT * 3);
        const targetPos = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);
        const sizes = new Float32Array(PARTICLE_COUNT);

        // Create a glow texture programmatically
        const createTicketTexture = () => {
            const canvas = document.createElement('canvas');
            canvas.width = 64; canvas.height = 64;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            grad.addColorStop(0, 'rgba(255,255,255,1)');
            grad.addColorStop(0.2, 'rgba(255,255,255,0.8)');
            grad.addColorStop(0.5, 'rgba(255,255,255,0.2)');
            grad.addColorStop(1, 'rgba(255,255,255,0)');
            ctx.fillStyle = grad;
            ctx.fillRect(0, 0, 64, 64);
            const tex = new THREE.CanvasTexture(canvas);
            return tex;
        };

        const material = new THREE.PointsMaterial({
            size: 0.08,
            map: createTicketTexture(),
            transparent: true,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            vertexColors: true
        });

        particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // Initialize positions
        for(let i=0; i<PARTICLE_COUNT; i++) {
            pos[i*3] = (Math.random()-0.5)*10;
            pos[i*3+1] = (Math.random()-0.5)*10;
            pos[i*3+2] = (Math.random()-0.5)*10;
            sizes[i] = Math.random();
        }
        geometry.setAttribute('position', new THREE.BufferAttribute(pos, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        // --- Form Math ---
        function setForm(type) {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let x, y, z;
                const idx = i * 3;
                if (type === 'heart') {
                    const t = Math.random() * Math.PI * 2;
                    x = 1.6 * Math.pow(Math.sin(t), 3);
                    y = (1.3 * Math.cos(t) - 0.5 * Math.cos(2*t) - 0.2 * Math.cos(3*t) - 0.1 * Math.cos(4*t));
                    z = (Math.random() - 0.5) * 0.5;
                } else if (type === 'saturn') {
                    if (i < PARTICLE_COUNT * 0.5) {
                        const phi = Math.acos(-1 + (2 * i) / (PARTICLE_COUNT * 0.5));
                        const theta = Math.sqrt(PARTICLE_COUNT * 0.5 * Math.PI) * phi;
                        x = Math.cos(theta) * Math.sin(phi) * 1.5;
                        y = Math.sin(theta) * Math.sin(phi) * 1.5;
                        z = Math.cos(phi) * 1.5;
                    } else {
                        const r = 2.2 + Math.random() * 0.8;
                        const a = Math.random() * Math.PI * 2;
                        x = Math.cos(a) * r; y = (Math.random()-0.5)*0.1; z = Math.sin(a) * r;
                    }
                } else if (type === 'galaxy') {
                    const angle = 0.1 * i;
                    const r = 0.05 * i / 80;
                    x = r * Math.cos(angle) + (Math.random()-0.5);
                    y = (Math.random()-0.5) * 0.5;
                    z = r * Math.sin(angle) + (Math.random()-0.5);
                } else { // Sphere
                    const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                    const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                    x = Math.cos(theta) * Math.sin(phi) * 2.5;
                    y = Math.sin(theta) * Math.sin(phi) * 2.5;
                    z = Math.cos(phi) * 2.5;
                }
                targetPos[idx] = x; targetPos[idx+1] = y; targetPos[idx+2] = z;
            }
        }
        setForm('sphere');

        // --- Hand Logic ---
        async function init() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById("webcam").srcObject = stream;
            document.getElementById("webcam-preview").srcObject = stream;
            animate();
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;
            
            const results = handLandmarker.detectForVideo(document.getElementById("webcam"), performance.now());
            let scale = 1.0;
            let colorBase = new THREE.Color(0x00ffff);

            if (results.landmarks && results.landmarks.length > 0) {
                const hand = results.landmarks[0];
                const pinch = Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y);
                scale = THREE.MathUtils.mapLinear(pinch, 0.05, 0.3, 0.2, 3.5);
                
                colorBase.setHSL((hand[0].x + time * 0.1) % 1, 0.8, 0.6);

                const isOpen = hand[8].y < hand[5].y && hand[20].y < hand[17].y;
                if (isOpen && performance.now() - lastChange > 2000) {
                    currentForm = forms[(forms.indexOf(currentForm) + 1) % forms.length];
                    setForm(currentForm);
                    lastChange = performance.now();
                }
                
                particleSystem.rotation.y += 0.005;
                particleSystem.rotation.z = (hand[0].x - 0.5) * 0.5;
            } else {
                particleSystem.rotation.y += 0.002;
            }

            const p = geometry.attributes.position.array;
            const c = geometry.attributes.color.array;

            for(let i=0; i<PARTICLE_COUNT; i++) {
                const i3 = i * 3;
                // Smooth Interpolation with organic jitter
                const noise = Math.sin(time + i) * 0.02;
                p[i3] += (targetPos[i3] * scale - p[i3]) * 0.08 + noise;
                p[i3+1] += (targetPos[i3+1] * scale - p[i3+1]) * 0.08 + noise;
                p[i3+2] += (targetPos[i3+2] * scale - p[i3+2]) * 0.08 + noise;

                c[i3] = colorBase.r; c[i3+1] = colorBase.g; c[i3+2] = colorBase.b;
            }
            geometry.attributes.position.needsUpdate = true;
            geometry.attributes.color.needsUpdate = true;

            composer.render();
        }

        init();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
