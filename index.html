<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Realistic Planet Gesture Interface</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; }
        #info {
            position: absolute; top: 30px; left: 30px; color: #fff; pointer-events: none;
            letter-spacing: 1px; z-index: 10; text-shadow: 2px 2px 4px rgba(0,0,0,0.5);
        }
        #webcam-preview {
            position: absolute; bottom: 20px; right: 20px; width: 220px; height: 165px;
            border-radius: 12px; border: 2px solid rgba(255,255,255,0.3);
            transform: scaleX(-1); object-fit: cover; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>

    <div id="info">
        <h1 style="margin:0; font-weight: 300;">PLANETARY INTERFACE</h1>
        <p style="opacity: 0.8;">Pinch to control Atmosphere and Clouds</p>
        <p style="opacity: 0.8;">Open Palm/Close Fist to cycle Planet Types</p>
    </div>
    <video id="webcam" style="display:none;" autoplay playsinline></video>
    <video id="webcam-preview" autoplay playsinline></video>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
                "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        // --- Configuration ---
        const PLANET_RADIUS = 2.5;
        let handLandmarker, composer;
        let planetGroup, cloudsMesh, atmosphereMesh;
        let currentPlanetIndex = 0;
        let gestureLastActive = 0;

        // Texture definitions (public domain/NASA)
        const planetConfigs = [
            {
                name: 'Terran',
                dayTex: 'https://unpkg.com/three-globe/example/img/earth-day.jpg',
                bumpTex: 'https://unpkg.com/three-globe/example/img/earth-topology.png',
                specTex: 'https://unpkg.com/three-globe/example/img/earth-water.png',
                cloudTex: 'https://unpkg.com/three-globe/example/img/earth-clouds.png',
                atmosColor: 0x00aaff,
                ambientColor: 0x111111
            },
            {
                name: 'Martian',
                dayTex: 'https://upload.wikimedia.org/wikipedia/commons/e/e0/Map_of_Mars_%28Viking_Mission%29.jpg',
                bumpTex: 'https://upload.wikimedia.org/wikipedia/commons/b/bb/Mars_topography_from_MOLA_with_labeled_regions.jpg',
                cloudTex: null,
                atmosColor: 0xee4422,
                ambientColor: 0x221111
            },
            {
                name: 'Jovian',
                dayTex: 'https://upload.wikimedia.org/wikipedia/commons/3/3d/Jupiter_from_Voyager_1_corrected.jpg',
                cloudTex: null,
                atmosColor: 0xffaa00,
                ambientColor: 0x222200
            }
        ];

        // --- Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth/window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 8;
        scene.fog = new THREE.FogExp2(0x000000, 0.05);

        // --- Lighting ---
        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);

        const sunLight = new THREE.DirectionalLight(0xffffff, 1.5);
        sunLight.position.set(5, 3, 5);
        scene.add(sunLight);

        // --- Post Processing (For Starfield & Atmosphere Bloom) ---
        const renderScene = new RenderPass(scene, camera);
        const bloomPass = new UnrealBloomPass(new THREE.Vector2(window.innerWidth, window.innerHeight), 1.5, 0.4, 0.85);
        bloomPass.threshold = 0.2;
        bloomPass.strength = 1.0; 
        bloomPass.radius = 0.6;

        composer = new EffectComposer(renderer);
        composer.addPass(renderScene);
        composer.addPass(bloomPass);

        // --- Background (Starfield) ---
        function createStarfield() {
            const starGeometry = new THREE.BufferGeometry();
            const starMaterial = new THREE.PointsMaterial({ color: 0xffffff, size: 0.03, transparent: true });
            const starVertices = [];
            for (let i = 0; i < 5000; i++) {
                const x = (Math.random() - 0.5) * 1000;
                const y = (Math.random() - 0.5) * 1000;
                const z = -Math.random() * 500;
                starVertices.push(x, y, z);
            }
            starGeometry.setAttribute('position', new THREE.Float32BufferAttribute(starVertices, 3));
            const stars = new THREE.Points(starGeometry, starMaterial);
            scene.add(stars);
        }
        createStarfield();

        // --- Planet Core Assembly ---
        planetGroup = new THREE.Group();
        scene.add(planetGroup);

        const texLoader = new THREE.TextureLoader();

        // High-res geometry for smooth texture wrapping
        const planetGeometry = new THREE.SphereGeometry(PLANET_RADIUS, 64, 64);
        const planetMaterial = new THREE.MeshStandardMaterial({
            roughness: 1,
            metalness: 0
        });
        const planetMesh = new THREE.Mesh(planetGeometry, planetMaterial);
        planetGroup.add(planetMesh);

        // Cloud Layer (Optional based on planet type)
        const cloudGeometry = new THREE.SphereGeometry(PLANET_RADIUS + 0.05, 64, 64);
        const cloudMaterial = new THREE.MeshStandardMaterial({
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
        cloudsMesh = new THREE.Mesh(cloudGeometry, cloudMaterial);
        planetGroup.add(cloudsMesh);

        // Atmosphere Glow (custom Shader for depth falloff)
        function createAtmosphere(color) {
            if(atmosphereMesh) scene.remove(atmosphereMesh);
            
            const atmosphereGeometry = new THREE.SphereGeometry(PLANET_RADIUS * 1.25, 64, 64);
            const atmosphereMaterial = new THREE.ShaderMaterial({
                vertexShader: `
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    void main() {
                        vNormal = normalize(normalMatrix * normal);
                        vPosition = position;
                        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
                    }
                `,
                fragmentShader: `
                    uniform vec3 atmosColor;
                    varying vec3 vNormal;
                    varying vec3 vPosition;
                    void main() {
                        // Intensity based on view angle (rim light)
                        float intensity = pow(0.7 - dot(vNormal, vec3(0.0, 0.0, 1.0)), 3.0);
                        // Intensity based on depth (fades toward space)
                        float dist = length(vPosition - cameraPosition) / 20.0;
                        gl_FragColor = vec4(atmosColor, 1.0) * intensity * (1.0 - dist);
                    }
                `,
                uniforms: {
                    atmosColor: { value: new THREE.Color(color) }
                },
                blending: THREE.AdditiveBlending,
                side: THREE.BackSide,
                transparent: true,
                depthWrite: false
            });
            atmosphereMesh = new THREE.Mesh(atmosphereGeometry, atmosphereMaterial);
            scene.add(atmosphereMesh);
        }

        function loadPlanetData(config) {
            document.getElementById('info').innerHTML = `
                <h1 style="margin:0; font-weight: 300;">PLANETARY: ${config.name.toUpperCase()}</h1>
                <p style="opacity: 0.8;">Pinch to control Atmosphere and Clouds</p>
                <p style="opacity: 0.8;">Open Palm/Close Fist to cycle Planet Types</p>
            `;
            ambientLight.color.setHex(config.ambientColor);
            
            planetMaterial.map = texLoader.load(config.dayTex);
            if(config.bumpTex) planetMaterial.bumpMap = texLoader.load(config.bumpTex);
            planetMaterial.bumpScale = 0.02;
            if(config.specTex) planetMaterial.specularMap = texLoader.load(config.specTex);
            planetMaterial.needsUpdate = true;

            if(config.cloudTex) {
                cloudsMesh.visible = true;
                cloudMaterial.map = texLoader.load(config.cloudTex);
                cloudMaterial.needsUpdate = true;
            } else {
                cloudsMesh.visible = false;
            }
            
            createAtmosphere(config.atmosColor);
        }
        loadPlanetData(planetConfigs[currentPlanetIndex]);

        // --- Hand Logic ---
        async function initHandTracking() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
                runningMode: "VIDEO", numHands: 1
            });
            const stream = await navigator.mediaDevices.getUserMedia({ video: true });
            document.getElementById("webcam").srcObject = stream;
            document.getElementById("webcam-preview").srcObject = stream;
            animate();
        }

        function isPinch(hand) {
            const pinchDist = Math.hypot(hand[4].x - hand[8].x, hand[4].y - hand[8].y);
            return pinchDist < 0.06;
        }

        function isFist(hand) {
            // Check if fingertips are below middle knuckles
            return (hand[8].y > hand[6].y && hand[12].y > hand[10].y && hand[16].y > hand[14].y);
        }

        function animate() {
            requestAnimationFrame(animate);
            const time = performance.now() * 0.001;
            
            // Subtle base rotations
            planetGroup.rotation.y += 0.001;
            cloudsMesh.rotation.y += 0.0015; // Separate rotation speed for clouds

            const results = handLandmarker.detectForVideo(document.getElementById("webcam"), performance.now());
            
            let cloudOpacity = 0.8;
            let atmosScale = 1.0;

            if (results.landmarks && results.landmarks.length > 0) {
                gestureLastActive = performance.now();
                const hand = results.landmarks[0];
                
                // --- Gesture 1: The Active Pinch (Control Environment) ---
                if (isPinch(hand)) {
                    // Use hand height (Y position) to map interaction
                    const heightValue = THREE.MathUtils.clamp(hand[8].y, 0.2, 0.8);
                    
                    // Terran: Clouds fade/appear
                    if (planetConfigs[currentPlanetIndex].name === 'Terran') {
                        cloudOpacity = THREE.MathUtils.mapLinear(heightValue, 0.2, 0.8, 1.0, 0.0);
                    }
                    
                    // All: Atmosphere expansion
                    atmosScale = THREE.MathUtils.mapLinear(heightValue, 0.2, 0.8, 1.2, 0.8);
                }

                // --- Gesture 2: Palm Open/Close (Cycle Planet Types) ---
                const isPalm = hand[8].y < hand[5].y && hand[12].y < hand[9].y && hand[16].y < hand[13].y;
                if (isPalm && !isFist(hand) && performance.now() - gestureLastActive > 2000) {
                    currentPlanetIndex = (currentPlanetIndex + 1) % planetConfigs.length;
                    loadPlanetData(planetConfigs[currentPlanetIndex]);
                }
            } else {
                // If hand is gone, return to resting state gradually
                if (planetConfigs[currentPlanetIndex].name === 'Terran') {
                    cloudOpacity = 0.8;
                }
                atmosScale = 1.0;
            }

            // --- Applying Gestural Values ---
            cloudMaterial.opacity += (cloudOpacity - cloudMaterial.opacity) * 0.1;
            if(atmosphereMesh) {
                const targetScale = PLANET_RADIUS * 1.25 * atmosScale;
                atmosphereMesh.scale.x += (targetScale - atmosphereMesh.scale.x) * 0.1;
                atmosphereMesh.scale.y += (targetScale - atmosphereMesh.scale.y) * 0.1;
                atmosphereMesh.scale.z += (targetScale - atmosphereMesh.scale.z) * 0.1;
            }

            composer.render();
        }

        initHandTracking();
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
