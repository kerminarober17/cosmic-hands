<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive 3D Particle System - Hand Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            overflow: hidden;
            background: #000;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        #canvas-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        #video-input {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 200px;
            height: 150px;
            border: 2px solid #00ff88;
            border-radius: 10px;
            z-index: 100;
            transform: scaleX(-1);
            display: none;
        }

        #ui-overlay {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.8);
            color: #00ff88;
            padding: 20px;
            border-radius: 10px;
            border: 2px solid #00ff88;
            z-index: 100;
            max-width: 300px;
        }

        #ui-overlay h2 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .control-group {
            margin: 10px 0;
        }

        .control-group label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
        }

        .control-group select, .control-group input[type="range"] {
            width: 100%;
            padding: 5px;
            background: #111;
            color: #00ff88;
            border: 1px solid #00ff88;
            border-radius: 5px;
        }

        #gesture-info {
            position: fixed;
            bottom: 10px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(0, 0, 0, 0.8);
            color: #fff;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            z-index: 100;
            border: 2px solid #00ff88;
        }

        #loading {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #00ff88;
            font-size: 24px;
            z-index: 1000;
            text-align: center;
        }

        .spinner {
            border: 4px solid rgba(0, 255, 136, 0.3);
            border-top: 4px solid #00ff88;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .instructions {
            margin-top: 15px;
            padding-top: 15px;
            border-top: 1px solid #00ff88;
            font-size: 12px;
            line-height: 1.6;
        }
    </style>
</head>
<body>
    <div id="loading">
        <div class="spinner"></div>
        <div>Loading Hand Tracking...</div>
    </div>

    <div id="canvas-container"></div>
    
    <video id="video-input" autoplay playsinline></video>
    
    <div id="ui-overlay">
        <h2>🎮 Particle Controls</h2>
        
        <div class="control-group">
            <label>Particle Template:</label>
            <select id="particle-template">
                <option value="hearts">❤️ Hearts</option>
                <option value="flowers">🌸 Flowers</option>
                <option value="saturn">🪐 Saturn Rings</option>
                <option value="fireworks">🎆 Fireworks</option>
                <option value="stars">⭐ Stars</option>
                <option value="bubbles">🫧 Bubbles</option>
            </select>
        </div>

        <div class="control-group">
            <label>Particle Count: <span id="count-value">1000</span></label>
            <input type="range" id="particle-count" min="100" max="5000" value="1000" step="100">
        </div>

        <div class="control-group">
            <label>Expansion Speed: <span id="speed-value">1.0</span></label>
            <input type="range" id="expansion-speed" min="0.1" max="3.0" value="1.0" step="0.1">
        </div>

        <div class="control-group">
            <label>Color Mode:</label>
            <select id="color-mode">
                <option value="rainbow">🌈 Rainbow</option>
                <option value="gesture">👋 Gesture Based</option>
                <option value="random">🎲 Random</option>
                <option value="single">🎨 Single Color</option>
            </select>
        </div>

        <div class="instructions">
            <strong>Gesture Controls:</strong><br>
            • Open hand: Expand particles<br>
            • Closed fist: Contract particles<br>
            • Peace sign: Change colors<br>
            • Point up: Switch template<br>
            • Wave: Reset system
        </div>
    </div>

    <div id="gesture-info">Initializing camera...</div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>

    <script type="module">
        import * as THREE from 'three';
        import { EffectComposer } from 'three/addons/postprocessing/EffectComposer.js';
        import { RenderPass } from 'three/addons/postprocessing/RenderPass.js';
        import { UnrealBloomPass } from 'three/addons/postprocessing/UnrealBloomPass.js';

        // Global variables
        let scene, camera, renderer, composer;
        let particleSystem;
        let video, canvas, ctx;
        let hands;
        let isHandTrackingReady = false;
        let currentGesture = 'none';
        let lastGestureTime = 0;
        
        // Particle templates
        const particleTemplates = {
            hearts: createHeartGeometry,
            flowers: createFlowerGeometry,
            saturn: createSaturnGeometry,
            fireworks: createFireworkGeometry,
            stars: createStarGeometry,
            bubbles: createBubbleGeometry
        };

        // Initialize Three.js scene
        function initScene() {
            const container = document.getElementById('canvas-container');
            
            // Scene
            scene = new THREE.Scene();
            scene.fog = new THREE.FogExp2(0x000000, 0.02);

            // Camera
            camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
            camera.position.z = 30;

            // Renderer
            renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
            renderer.setSize(window.innerWidth, window.innerHeight);
            renderer.setPixelRatio(window.devicePixelRatio);
            container.appendChild(renderer.domElement);

            // Post-processing
            composer = new EffectComposer(renderer);
            const renderPass = new RenderPass(scene, camera);
            composer.addPass(renderPass);

            const bloomPass = new UnrealBloomPass(
                new THREE.Vector2(window.innerWidth, window.innerHeight),
                1.5, 0.4, 0.85
            );
            bloomPass.threshold = 0;
            bloomPass.strength = 1.2;
            bloomPass.radius = 0.5;
            composer.addPass(bloomPass);

            // Lights
            const ambientLight = new THREE.AmbientLight(0x404040);
            scene.add(ambientLight);

            const pointLight = new THREE.PointLight(0xffffff, 2, 100);
            pointLight.position.set(0, 0, 10);
            scene.add(pointLight);

            // Initialize particle system
            particleSystem = new ParticleSystem(1000, 'hearts');
            scene.add(particleSystem.mesh);

            // Handle resize
            window.addEventListener('resize', onWindowResize);
        }

        function onWindowResize() {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
            composer.setSize(window.innerWidth, window.innerHeight);
        }

        // Particle System Class
        class ParticleSystem {
            constructor(count, template) {
                this.count = count;
                this.template = template;
                this.geometry = this.createParticleGeometry();
                this.material = new THREE.PointsMaterial({
                    size: 0.5,
                    vertexColors: true,
                    transparent: true,
                    opacity: 0.8,
                    blending: THREE.AdditiveBlending
                });
                this.mesh = new THREE.Points(this.geometry, this.material);
                this.particles = [];
                this.velocities = [];
                this.initParticles();
            }

            createParticleGeometry() {
                const geometry = new THREE.BufferGeometry();
                const positions = new Float32Array(this.count * 3);
                const colors = new Float32Array(this.count * 3);
                const sizes = new Float32Array(this.count);

                for (let i = 0; i < this.count; i++) {
                    const i3 = i * 3;
                    positions[i3] = (Math.random() - 0.5) * 50;
                    positions[i3 + 1] = (Math.random() - 0.5) * 50;
                    positions[i3 + 2] = (Math.random() - 0.5) * 50;

                    colors[i3] = Math.random();
                    colors[i3 + 1] = Math.random();
                    colors[i3 + 2] = Math.random();

                    sizes[i] = Math.random() * 2;

                    this.particles.push({
                        x: positions[i3],
                        y: positions[i3 + 1],
                        z: positions[i3 + 2],
                        baseX: positions[i3],
                        baseY: positions[i3 + 1],
                        baseZ: positions[i3 + 2],
                        phase: Math.random() * Math.PI * 2,
                        speed: Math.random() * 0.02 + 0.01
                    });

                    this.velocities.push({
                        x: 0,
                        y: 0,
                        z: 0
                    });
                }

                geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
                geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
                geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

                return geometry;
            }

            initParticles() {
                // Initialize particle positions
            }

            update(time, gesture, expansionSpeed) {
                const positions = this.geometry.attributes.position.array;
                const colors = this.geometry.attributes.color.array;

                for (let i = 0; i < this.count; i++) {
                    const i3 = i * 3;
                    const particle = this.particles[i];
                    const velocity = this.velocities[i];

                    // Apply gesture-based forces
                    if (gesture === 'open') {
                        // Expand
                        particle.x += (particle.x - 0) * 0.02 * expansionSpeed;
                        particle.y += (particle.y - 0) * 0.02 * expansionSpeed;
                        particle.z += (particle.z - 0) * 0.02 * expansionSpeed;
                    } else if (gesture === 'closed') {
                        // Contract
                        particle.x *= 0.98;
                        particle.y *= 0.98;
                        particle.z *= 0.98;
                    } else if (gesture === 'peace') {
                        // Spiral motion
                        particle.phase += 0.05;
                        particle.x = particle.baseX + Math.cos(particle.phase) * 10;
                        particle.z = particle.baseZ + Math.sin(particle.phase) * 10;
                    }

                    // Add some noise
                    particle.x += Math.sin(time * particle.speed + particle.phase) * 0.05;
                    particle.y += Math.cos(time * particle.speed + particle.phase) * 0.05;

                    positions[i3] = particle.x;
                    positions[i3 + 1] = particle.y;
                    positions[i3 + 2] = particle.z;

                    // Update colors based on gesture
                    if (gesture === 'peace') {
                        colors[i3] = (Math.sin(time + i) + 1) / 2;
                        colors[i3 + 1] = (Math.cos(time + i) + 1) / 2;
                        colors[i3 + 2] = (Math.sin(time * 0.5 + i) + 1) / 2;
                    }
                }

                this.geometry.attributes.position.needsUpdate = true;
                this.geometry.attributes.color.needsUpdate = true;

                // Rotate entire system
                this.mesh.rotation.y += 0.001;
                this.mesh.rotation.x += 0.0005;
            }

            switchTemplate(templateName) {
                this.template = templateName;
                // Regenerate geometry with new template
                scene.remove(this.mesh);
                this.geometry.dispose();
                this.geometry = this.createParticleGeometry();
                this.mesh = new THREE.Points(this.geometry, this.material);
                scene.add(this.mesh);
            }

            setParticleCount(count) {
                this.count = count;
                scene.remove(this.mesh);
                this.geometry.dispose();
                this.geometry = this.createParticleGeometry();
                this.mesh = new THREE.Points(this.geometry, this.material);
                scene.add(this.mesh);
            }
        }

        // Geometry creation functions
        function createHeartGeometry() {
            // Heart shape logic
            return new THREE.BufferGeometry();
        }

        function createFlowerGeometry() {
            // Flower shape logic
            return new THREE.BufferGeometry();
        }

        function createSaturnGeometry() {
            // Saturn rings logic
            return new THREE.BufferGeometry();
        }

        function createFireworkGeometry() {
            // Firework burst logic
            return new THREE.BufferGeometry();
        }

        function createStarGeometry() {
            // Star shape logic
            return new THREE.BufferGeometry();
        }

        function createBubbleGeometry() {
            // Bubble shape logic
            return new THREE.BufferGeometry();
        }

        // Hand Tracking Setup
        function initHandTracking() {
            video = document.getElementById('video-input');
            canvas = document.createElement('canvas');
            ctx = canvas.getContext('2d');

            hands = new Hands({
                locateFile: (file) => {
                    return `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`;
                }
            });

            hands.setOptions({
                maxNumHands: 2,
                modelComplexity: 1,
                minDetectionConfidence: 0.7,
                minTrackingConfidence: 0.5
            });

            hands.onResults(onHandResults);

            // Start camera
            const camera = new Camera(video, {
                onFrame: async () => {
                    await hands.send({ image: video });
                },
                width: 640,
                height: 480
            });

            camera.start()
                .then(() => {
                    isHandTrackingReady = true;
                    document.getElementById('loading').style.display = 'none';
                    video.style.display = 'block';
                    document.getElementById('gesture-info').textContent = 'Hand tracking active!';
                })
                .catch(err => {
                    console.error('Camera error:', err);
                    document.getElementById('gesture-info').textContent = 'Camera access denied. Using mouse fallback.';
                });
        }

        function onHandResults(results) {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                detectGesture(landmarks);
            } else {
                currentGesture = 'none';
            }
        }

        function detectGesture(landmarks) {
            const now = Date.now();
            
            // Calculate distances between fingers
            const thumbTip = landmarks[4];
            const indexTip = landmarks[8];
            const middleTip = landmarks[12];
            const ringTip = landmarks[16];
            const pinkyTip = landmarks[20];
            const indexPIP = landmarks[6];
            const middlePIP = landmarks[10];

            // Distance calculations
            const distThumbIndex = Math.hypot(
                thumbTip.x - indexTip.x,
                thumbTip.y - indexTip.y
            );

            const fingersOpen = [
                indexTip.y < indexPIP.y,
                middleTip.y < middlePIP.y,
                ringTip.y < landmarks[14].y,
                pinkyTip.y < landmarks[18].y
            ].filter(Boolean).length;

            // Gesture detection
            if (distThumbIndex < 0.05 && fingersOpen === 0) {
                currentGesture = 'closed'; // Fist
            } else if (fingersOpen >= 3) {
                currentGesture = 'open'; // Open hand
            } else if (indexTip.y < indexPIP.y && middleTip.y > middlePIP.y && fingersOpen === 1) {
                currentGesture = 'peace'; // Peace sign
            } else if (indexTip.y < indexPIP.y && fingersOpen === 1) {
                currentGesture = 'point'; // Pointing
            }

            // Update UI
            if (now - lastGestureTime > 500) {
                document.getElementById('gesture-info').textContent = 
                    `Gesture: ${currentGesture.toUpperCase()}`;
                lastGestureTime = now;

                // Switch template on point up
                if (currentGesture === 'point') {
                    switchParticleTemplate();
                }
            }
        }

        function switchParticleTemplate() {
            const templates = Object.keys(particleTemplates);
            const currentIndex = templates.indexOf(particleSystem.template);
            const nextIndex = (currentIndex + 1) % templates.length;
            const nextTemplate = templates[nextIndex];
            
            particleSystem.switchTemplate(nextTemplate);
            document.getElementById('particle-template').value = nextTemplate;
        }

        // UI Event Listeners
        function setupUI() {
            document.getElementById('particle-template').addEventListener('change', (e) => {
                particleSystem.switchTemplate(e.target.value);
            });

            document.getElementById('particle-count').addEventListener('input', (e) => {
                const count = parseInt(e.target.value);
                document.getElementById('count-value').textContent = count;
                particleSystem.setParticleCount(count);
            });

            document.getElementById('expansion-speed').addEventListener('input', (e) => {
                document.getElementById('speed-value').textContent = e.target.value;
            });

            document.getElementById('color-mode').addEventListener('change', (e) => {
                // Handle color mode changes
                const mode = e.target.value;
                if (mode === 'single') {
                    particleSystem.material.color.setHex(0x00ff88);
                }
            });
        }

        // Animation loop
        let time = 0;
        function animate() {
            requestAnimationFrame(animate);
            time += 0.01;

            const expansionSpeed = parseFloat(document.getElementById('expansion-speed').value);
            
            if (particleSystem) {
                particleSystem.update(time, currentGesture, expansionSpeed);
            }

            // Camera follow hand gesture
            if (currentGesture === 'open') {
                camera.position.z = 30 + Math.sin(time) * 5;
            } else if (currentGesture === 'closed') {
                camera.position.z = 20;
            } else {
                camera.position.z = 30;
            }

            composer.render();
        }

        // Initialize everything
        function init() {
            initScene();
            setupUI();
            initHandTracking();
            animate();
        }

        // Start
        init();
    </script>
</body>
</html>
