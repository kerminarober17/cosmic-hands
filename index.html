<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture-Controlled Particles</title>
    <style>
        body { margin: 0; overflow: hidden; background: #000; font-family: sans-serif; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 1px 1px 2px black;
        }
        #video-container {
            position: absolute;
            bottom: 20px;
            right: 20px;
            width: 200px;
            border: 2px solid rgba(255,255,255,0.5);
            border-radius: 8px;
            transform: scaleX(-1); /* Mirror video */
        }
    </style>
</head>
<body>

    <div id="info">
        <h2>Hand Gesture Particles</h2>
        <p>Pinch fingers to Expand/Contract</p>
        <p>Move hand to change Color & Rotation</p>
        <p>Open hand wide to cycle Shapes (Heart, Saturn, Sphere)</p>
    </div>
    <video id="webcam" style="display:none;" autoplay playsinline></video>
    <canvas id="video-container"></canvas>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { HandLandmarker, FilesetResolver } from "https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0";

        // --- Configuration ---
        const PARTICLE_COUNT = 5000;
        let handLandmarker;
        let webcamRunning = false;
        let currentTemplate = 'sphere';
        const templates = ['sphere', 'heart', 'saturn'];
        let lastTemplateChange = 0;

        // --- Three.js Setup ---
        const scene = new THREE.Scene();
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        document.body.appendChild(renderer.domElement);

        camera.position.z = 5;

        // Particle System
        const geometry = new THREE.BufferGeometry();
        const positions = new Float32Array(PARTICLE_COUNT * 3);
        const targetPositions = new Float32Array(PARTICLE_COUNT * 3);
        const colors = new Float32Array(PARTICLE_COUNT * 3);

        for (let i = 0; i < PARTICLE_COUNT; i++) {
            positions[i * 3] = (Math.random() - 0.5) * 10;
            positions[i * 3 + 1] = (Math.random() - 0.5) * 10;
            positions[i * 3 + 2] = (Math.random() - 0.5) * 10;
        }

        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

        const material = new THREE.PointsMaterial({
            size: 0.05,
            vertexColors: true,
            transparent: true,
            blending: THREE.AdditiveBlending
        });

        const particleSystem = new THREE.Points(geometry, material);
        scene.add(particleSystem);

        // --- Shape Templates ---
        function updateTemplate(type) {
            for (let i = 0; i < PARTICLE_COUNT; i++) {
                let x, y, z;
                if (type === 'heart') {
                    const t = Math.random() * Math.PI * 2;
                    x = 16 * Math.pow(Math.sin(t), 3) / 10;
                    y = (13 * Math.cos(t) - 5 * Math.cos(2 * t) - 2 * Math.cos(3 * t) - Math.cos(4 * t)) / 10;
                    z = (Math.random() - 0.5) * 0.5;
                } else if (type === 'saturn') {
                    if (i < PARTICLE_COUNT * 0.6) { // Sphere core
                        const phi = Math.acos(-1 + (2 * i) / (PARTICLE_COUNT * 0.6));
                        const theta = Math.sqrt(PARTICLE_COUNT * 0.6 * Math.PI) * phi;
                        x = Math.cos(theta) * Math.sin(phi) * 1.2;
                        y = Math.sin(theta) * Math.sin(phi) * 1.2;
                        z = Math.cos(phi) * 1.2;
                    } else { // Rings
                        const angle = Math.random() * Math.PI * 2;
                        const radius = 1.8 + Math.random() * 0.7;
                        x = Math.cos(angle) * radius;
                        y = Math.sin(angle) * radius * 0.2; // flattened
                        z = Math.sin(angle) * radius;
                    }
                } else { // Sphere
                    const phi = Math.acos(-1 + (2 * i) / PARTICLE_COUNT);
                    const theta = Math.sqrt(PARTICLE_COUNT * Math.PI) * phi;
                    x = Math.cos(theta) * Math.sin(phi) * 2;
                    y = Math.sin(theta) * Math.sin(phi) * 2;
                    z = Math.cos(phi) * 2;
                }
                targetPositions[i * 3] = x;
                targetPositions[i * 3 + 1] = y;
                targetPositions[i * 3 + 2] = z;
            }
        }
        updateTemplate('sphere');

        // --- MediaPipe Hand Tracking Setup ---
        async function initHands() {
            const vision = await FilesetResolver.forVisionTasks("https://cdn.jsdelivr.net/npm/@mediapipe/tasks-vision@0.10.0/wasm");
            handLandmarker = await HandLandmarker.createFromOptions(vision, {
                baseOptions: { modelAssetPath: `https://storage.googleapis.com/mediapipe-models/hand_landmarker/hand_landmarker/float16/1/hand_landmarker.task`, delegate: "GPU" },
                runningMode: "VIDEO",
                numHands: 1
            });
            startCamera();
        }

        async function startCamera() {
            const video = document.getElementById("webcam");
            const constraints = { video: true };
            const stream = await navigator.mediaDevices.getUserMedia(constraints);
            video.srcObject = stream;
            video.addEventListener("loadeddata", () => { webcamRunning = true; animate(); });
        }

        // --- Animation & Logic Loop ---
        function animate() {
            requestAnimationFrame(animate);

            if (webcamRunning) {
                const video = document.getElementById("webcam");
                const results = handLandmarker.detectForVideo(video, performance.now());
                
                if (results.landmarks && results.landmarks.length > 0) {
                    const hand = results.landmarks[0];
                    
                    // Interaction 1: Expansion based on Thumb & Index pinch distance
                    const dx = hand[4].x - hand[8].x;
                    const dy = hand[4].y - hand[8].y;
                    const pinchDist = Math.sqrt(dx*dx + dy*dy);
                    const scale = THREE.MathUtils.mapLinear(pinchDist, 0.05, 0.3, 0.5, 4);

                    // Interaction 2: Color based on Hand Position (X and Y)
                    const hue = hand[0].x * 360;
                    const saturation = 0.8;
                    const colorObj = new THREE.Color(`hsl(${hue}, 80%, 60%)`);

                    // Interaction 3: Shape Switching (Palm Open detection)
                    const isPalmOpen = hand[8].y < hand[5].y && hand[12].y < hand[9].y && hand[16].y < hand[13].y;
                    if (isPalmOpen && performance.now() - lastTemplateChange > 1500) {
                        const currentIndex = templates.indexOf(currentTemplate);
                        currentTemplate = templates[(currentIndex + 1) % templates.length];
                        updateTemplate(currentTemplate);
                        lastTemplateChange = performance.now();
                    }

                    // Apply hand-driven logic to particles
                    const posAttr = geometry.attributes.position;
                    const colAttr = geometry.attributes.color;

                    for (let i = 0; i < PARTICLE_COUNT; i++) {
                        // Interpolate towards target positions
                        posAttr.array[i * 3] += (targetPositions[i * 3] * scale - posAttr.array[i * 3]) * 0.1;
                        posAttr.array[i * 3 + 1] += (targetPositions[i * 3 + 1] * scale - posAttr.array[i * 3 + 1]) * 0.1;
                        posAttr.array[i * 3 + 2] += (targetPositions[i * 3 + 2] * scale - posAttr.array[i * 3 + 2]) * 0.1;

                        // Gradual color shift
                        colAttr.array[i * 3] = colorObj.r;
                        colAttr.array[i * 3 + 1] = colorObj.g;
                        colAttr.array[i * 3 + 2] = colorObj.b;
                    }
                    posAttr.needsUpdate = true;
                    colAttr.needsUpdate = true;

                    // Rotation based on hand tilt
                    particleSystem.rotation.y += 0.01;
                    particleSystem.rotation.x = (hand[0].y - 0.5) * 2;
                }
            }

            renderer.render(scene, camera);
        }

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        initHands();
    </script>
</body>
</html>
