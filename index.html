<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cosmic Hand Tracking System</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            background-color: #050510; /* Deep Space dark */
            font-family: sans-serif;
        }
        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
        #videoElement {
            display: none; /* Hide the raw webcam feed */
        }
        #ui {
            position: absolute;
            top: 20px;
            left: 20px;
            color: white;
            pointer-events: none;
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        h1 { margin: 0 0 5px 0; font-size: 24px; }
        p { margin: 0; font-size: 14px; color: #aaa; }
        #status { color: #00ff88; font-weight: bold; margin-top: 10px; }
    </style>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
</head>
<body>

    <div id="ui">
        <h1>Cosmic Particle Sandbox</h1>
        <p>1 Finger: Sun | 2: Saturn | 3: Black Hole | 4: Galaxy | 5: Supernova</p>
        <p>Pinch to Scale. Move wrist to Rotate & change Color.</p>
        <div id="status">Loading Webcam & AI Models...</div>
    </div>

    <video id="videoElement" autoplay playsinline></video>

    <script>
        // --- 1. THREE.JS SETUP ---
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.02);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.z = 30;

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // --- 2. PARTICLE SYSTEM ---
        const particleCount = 15000;
        const geometry = new THREE.BufferGeometry();
        
        // Arrays for positions and interpolation (Lerp)
        const positions = new Float32Array(particleCount * 3);
        const targetPositions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        
        // Custom Shader Material for glowing soft particles
        const material = new THREE.ShaderMaterial({
            uniforms: {
                globalColor: { value: new THREE.Color(0xffaa00) },
                scale: { value: 1.0 }
            },
            vertexShader: `
                attribute vec3 customColor;
                varying vec3 vColor;
                uniform float scale;
                void main() {
                    vColor = customColor;
                    vec4 mvPosition = modelViewMatrix * vec4(position * scale, 1.0);
                    gl_PointSize = 6.0 * (30.0 / -mvPosition.z);
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                varying vec3 vColor;
                uniform vec3 globalColor;
                void main() {
                    // Soft circle
                    float d = distance(gl_PointCoord, vec2(0.5));
                    if (d > 0.5) discard;
                    // Additive blend math
                    vec3 finalColor = vColor * globalColor;
                    gl_FragColor = vec4(finalColor, 1.0 - (d * 2.0));
                }
            `,
            blending: THREE.AdditiveBlending,
            depthTest: false,
            transparent: true
        });

        const particles = new THREE.Points(geometry, material);
        scene.add(particles);

        // --- 3. SHAPE GENERATORS ---
        let currentShape = 0; // 1=Sun, 2=Saturn, 3=BlackHole, 4=Galaxy, 5=Supernova
        
        function setTargetPositions(shapeFunc) {
            for (let i = 0; i < particleCount; i++) {
                const pos = shapeFunc(i);
                targetPositions[i * 3] = pos.x;
                targetPositions[i * 3 + 1] = pos.y;
                targetPositions[i * 3 + 2] = pos.z;
                
                // Base colors based on distance from center
                const d = Math.sqrt(pos.x*pos.x + pos.y*pos.y + pos.z*pos.z) / 20;
                colors[i * 3] = 1.0; 
                colors[i * 3 + 1] = Math.max(0, 1.0 - d);
                colors[i * 3 + 2] = Math.max(0, 1.0 - d * 2);
            }
            geometry.setAttribute('customColor', new THREE.BufferAttribute(colors, 3));
        }

        const Shapes = {
            // Sun: Dense turbulent sphere
            Sun: () => {
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                const r = Math.cbrt(Math.random()) * 8; // Dense core distribution
                return {
                    x: r * Math.sin(phi) * Math.cos(theta),
                    y: r * Math.sin(phi) * Math.sin(theta),
                    z: r * Math.cos(phi)
                };
            },
            // Saturn: Sphere + Flat Ring
            Saturn: (i) => {
                if (i < particleCount * 0.3) {
                    // Central Planet
                    return Shapes.Sun();
                } else {
                    // Ring (x = r*cos(t), z = r*sin(t))
                    const theta = Math.random() * Math.PI * 2;
                    const r = 12 + Math.random() * 8; // Inner radius 12, outer 20
                    return {
                        x: r * Math.cos(theta),
                        y: (Math.random() - 0.5) * 0.5, // Thin ring height
                        z: r * Math.sin(theta)
                    };
                }
            },
            // Black Hole: Disappearing center
            BlackHole: () => {
                const theta = Math.random() * Math.PI * 2;
                const r = 5 + Math.random() * 20; // Event horizon at radius 5
                const yOffset = (Math.random() - 0.5) * (30 / r); // Funnel effect
                return {
                    x: r * Math.cos(theta),
                    y: yOffset,
                    z: r * Math.sin(theta)
                };
            },
            // Galaxy: Logarithmic Spiral
            Galaxy: () => {
                const arms = 2;
                const armOffset = (Math.floor(Math.random() * arms) / arms) * Math.PI * 2;
                const a = 1.5; 
                const b = 0.2; // tighter spiral
                const theta = Math.random() * Math.PI * 4; // Length of arms
                
                const r = a * Math.exp(b * theta) + (Math.random() - 0.5) * 3; // r = a * e^(b*theta)
                const finalTheta = theta + armOffset;
                
                return {
                    x: r * Math.cos(finalTheta),
                    y: (Math.random() - 0.5) * (20 / r), // Thicker in center, thin at edges
                    z: r * Math.sin(finalTheta)
                };
            },
            // Supernova: Explosive shell
            Supernova: () => {
                const u = Math.random();
                const v = Math.random();
                const theta = u * 2.0 * Math.PI;
                const phi = Math.acos(2.0 * v - 1.0);
                const r = 40 + Math.random() * 10; // Outer explosive shell
                return {
                    x: r * Math.sin(phi) * Math.cos(theta),
                    y: r * Math.sin(phi) * Math.sin(theta),
                    z: r * Math.cos(phi)
                };
            }
        };

        // Initialize with Sun
        setTargetPositions(Shapes.Sun);
        // Copy initial positions to current positions so it doesn't animate from 0,0,0
        for(let i=0; i<positions.length; i++) positions[i] = targetPositions[i];
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));

        // --- 4. MEDIAPIPE HAND TRACKING ---
        const videoElement = document.getElementById('videoElement');
        let handRotX = 0, handRotY = 0, pinchScale = 1.0, targetColor = new THREE.Color(0xffaa00);
        let lerpSpeed = 0.05;

        const hands = new Hands({
            locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/hands/${file}`
        });

        hands.setOptions({
            maxNumHands: 1,
            modelComplexity: 1,
            minDetectionConfidence: 0.7,
            minTrackingConfidence: 0.7
        });

        hands.onResults((results) => {
            if (results.multiHandLandmarks && results.multiHandLandmarks.length > 0) {
                const landmarks = results.multiHandLandmarks[0];
                document.getElementById('status').innerText = "Hand Detected - Cosmic Control Active";
                document.getElementById('status').style.color = "#00ff88";

                // 1. Wrist Position -> Rotation & Color
                const wrist = landmarks[0];
                handRotY = (wrist.x - 0.5) * Math.PI * 2;
                handRotX = (wrist.y - 0.5) * Math.PI;
                targetColor.setHSL(wrist.x, 1.0, 0.6);

                // 2. Pinch Detection -> Scale
                const thumbTip = landmarks[4];
                const indexTip = landmarks[8];
                const dist = Math.hypot(thumbTip.x - indexTip.x, thumbTip.y - indexTip.y);
                pinchScale = Math.max(0.5, Math.min(3.0, dist * 5));

                // 3. Finger Count -> Morph Shape
                let fingers = 0;
                if(landmarks[8].y < landmarks[6].y) fingers++;  // Index
                if(landmarks[12].y < landmarks[10].y) fingers++; // Middle
                if(landmarks[16].y < landmarks[14].y) fingers++; // Ring
                if(landmarks[20].y < landmarks[18].y) fingers++; // Pinky
                if(landmarks[4].x < landmarks[3].x) fingers++;   // Thumb (rough calc for right hand)

                if (fingers !== currentShape) {
                    currentShape = fingers;
                    lerpSpeed = 0.02; // Slower lerp for smooth transitions
                    if (fingers === 1) setTargetPositions(Shapes.Sun);
                    else if (fingers === 2) setTargetPositions(Shapes.Saturn);
                    else if (fingers === 3) setTargetPositions(Shapes.BlackHole);
                    else if (fingers === 4) setTargetPositions(Shapes.Galaxy);
                    else if (fingers >= 5) {
                        setTargetPositions(Shapes.Supernova);
                        lerpSpeed = 0.1; // Fast explosion
                    }
                }
            } else {
                document.getElementById('status').innerText = "Searching for hand...";
                document.getElementById('status').style.color = "#ff3366";
                targetColor.setHSL(0.1, 1.0, 0.6); // Default orange
            }
        });

        const cameraFeed = new Camera(videoElement, {
            onFrame: async () => { await hands.send({ image: videoElement }); },
            width: 640,
            height: 480
        });
        cameraFeed.start();

        // --- 5. ANIMATION LOOP (LERPING) ---
        function animate() {
            requestAnimationFrame(animate);

            // Lerp Particle Positions (Fluid transitions)
            const posAttr = geometry.attributes.position;
            for (let i = 0; i < positions.length; i++) {
                positions[i] += (targetPositions[i] - positions[i]) * lerpSpeed;
            }
            posAttr.needsUpdate = true;

            // Smooth rotation and scale interpolation
            particles.rotation.x += (handRotX - particles.rotation.x) * 0.1;
            particles.rotation.y += (handRotY - particles.rotation.y) * 0.1;
            material.uniforms.scale.value += (pinchScale - material.uniforms.scale.value) * 0.1;
            
            // Smooth color interpolation
            material.uniforms.globalColor.value.lerp(targetColor, 0.05);

            // Slow idle spin
            particles.rotation.y += 0.002;

            renderer.render(scene, camera);
        }

        // Handle window resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        animate();
    </script>
</body>
</html>
